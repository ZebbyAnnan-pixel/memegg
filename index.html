<!DOCTYPE html>
<html>
<head>
  <title>BOBA.ai</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <div class="sidebar">
    <h2>BOBA.ai</h2>
    <button onclick="newChat()">+ New Chat</button>
    <div id="history"></div>
  </div>

  <div class="main">
    <div id="chat" class="chat"></div>

    <form class="inputArea" onsubmit="generate(); return false;">
      <textarea id="prompt" placeholder="Message BOBA.ai..." rows="1"></textarea>
      <button type="submit">➤</button>
    </form>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
