<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>malludino.gg</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Montserrat',sans-serif;background:#f2f2f2;text-align:center;color:#222;}
h1{margin-top:40px;font-size:42px;letter-spacing:2px;}
.subtitle{font-size:14px;color:#666;margin-bottom:40px;}
#menu{margin-top:30px;}
.menuCard{background:white;width:90%;max-width:400px;margin:0 auto;padding:40px;border-radius:20px;box-shadow:0 20px 40px rgba(0,0,0,0.1);}
button{padding:14px 35px;margin:10px;font-size:15px;border-radius:40px;border:none;cursor:pointer;transition:0.25s;}
.primaryBtn{background:#222;color:white;}
.primaryBtn:hover{background:#000;transform:scale(1.05);}
.secondaryBtn{background:#e5e5e5;}
.secondaryBtn:hover{background:#d0d0d0;transform:scale(1.05);}
canvas{display:none;margin:40px auto;background:white;border-radius:10px;box-shadow:0 20px 50px rgba(0,0,0,0.15);width:95%;max-width:900px;height:auto;cursor:pointer;}
.gameContainer{display:none;text-align:center;}
.scoreContainer{display:flex;justify-content:space-around;align-items:center;max-width:900px;margin:10px auto;font-weight:bold;font-size:18px;}
#score{display:none;}
#hiScore{display:none;}
.milestone{animation:pulse 0.5s;}
@keyframes pulse{0%{transform:scale(1);color:#222;}50%{transform:scale(1.3);color:#2ecc71;}100%{transform:scale(1);color:#222;}}
#gameOver{display:none;margin-top:20px;}
#exitBtn{display:none;}
.usernameWrapper{display:flex;justify-content:center;align-items:center;gap:10px;margin-bottom:10px;}
#usernameInput{padding:12px 15px;border-radius:30px;border:1px solid #ccc;width:70%;font-size:14px;}
#confirmNameBtn{background:#2ecc71;color:white;border:none;width:45px;height:45px;border-radius:50%;font-size:18px;cursor:pointer;transition:0.2s;}
#confirmNameBtn:hover{transform:scale(1.1);background:#27ae60;}
#nameStatus{display:none;color:#2ecc71;font-size:13px;margin-bottom:15px;}
#leaderboard{margin:40px auto;width:90%;max-width:500px;}
.lbTitle{font-weight:bold;margin-bottom:15px;}
.lbItem{display:flex;align-items:center;justify-content:space-between;background:#1e1e1e;color:white;padding:12px 15px;border-radius:12px;margin-bottom:10px;font-size:14px;}
.lbLeft{display:flex;align-items:center;gap:10px;}
.lbRank{width:25px;text-align:center;opacity:0.7;}
.lbAvatar{width:30px;height:30px;border-radius:50%;background:#444;display:flex;align-items:center;justify-content:center;font-size:12px;}
.lbScore{opacity:0.8;}
.lbYou{background:#2ecc71 !important;color:black;font-weight:bold;}
.socialBtn{display:inline-block;margin-top:15px;padding:10px 25px;border-radius:30px;background:#000;color:white;text-decoration:none;transition:0.3s;}
.socialBtn:hover{transform:scale(1.1);background:#333;}
#credits{margin-top:80px;padding:30px;font-size:14px;color:#777;}
.controls{font-size:12px;color:#999;margin-top:10px;}
@media(max-width:600px){
h1{font-size:28px;}
button{width:80%;font-size:16px;}
.scoreContainer{flex-direction:column;gap:10px;}
canvas{height:auto;}
}
</style>
</head>

<body>

<h1>malludino.gg</h1>
<div class="subtitle">StylishDinos - Chrome Dino Edition</div>

<div id="menu">
<div class="menuCard">
<h2>Select Mode</h2>

<div class="usernameWrapper">
<input id="usernameInput" placeholder="Enter Username">
<button id="confirmNameBtn">✅</button>
</div>
<p id="nameStatus">Username confirmed!</p>

<button class="primaryBtn" onclick="startGame('normal')">Normal Mode</button>
<button class="secondaryBtn" onclick="startGame('rishi')">Rishi Mode</button>

<div class="controls">
<p>🖥️ Desktop: SPACE/UP to Jump | DOWN to Duck</p>
<p>📱 Mobile: Tap to Jump | Swipe Down to Duck</p>
</div>
</div>
</div>

<div id="leaderboard"></div>

<div class="gameContainer" id="gameContainer">
<canvas id="gameCanvas" width="900" height="300"></canvas>
<div class="scoreContainer">
<div id="score">Score: 0</div>
<div id="hiScore">HI 0</div>
</div>
<button id="exitBtn" class="secondaryBtn" onclick="backToMenu()">Exit</button>

<div id="gameOver" style="margin-top:20px;">
<h3>Game Over! 💀</h3>
<button class="primaryBtn" onclick="restartGame()">Restart</button>
<button class="secondaryBtn" onclick="backToMenu()">Menu</button>
</div>
</div>

<div id="credits">
Crafted by <b>ZebbyAnnan😇</b><br>
malludino.gg © 2026 | Chrome Dino Edition<br>
<a class="socialBtn" href="https://www.instagram.com/i.wziee?igsh=MTZqbXplNDY0b253Yw==" target="_blank">Instagram</a>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
getFirestore, 
collection, 
getDocs, 
query, 
orderBy, 
limit,
doc,
getDoc,
setDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyA9I4oU9khFGycZyIOvHcg3p6OrhSa1GzM",
authDomain: "malludino-gg.firebaseapp.com",
projectId: "malludino-gg",
storageBucket: "malludino-gg.firebasestorage.app",
messagingSenderId: "298331255490",
appId: "1:298331255490:web:87440667c24a55c289c15b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* Sounds */
const deathSound = new Audio("ayoo.mp3");
const jumpSound = new Audio("jumpeffect.rishi.mp3");
const milestoneSound = new Audio("milestone.mp3") || new Audio();
jumpSound.volume = 0.7;
deathSound.volume = 0.8;

let savedUsername = "";
let hiScore = localStorage.getItem("hiScore") || 0;

document.getElementById("confirmNameBtn").addEventListener("click", () => {
  const input = document.getElementById("usernameInput").value.trim();
  if(input.length < 2) {
    alert("Enter valid username!");
    return;
  }
  savedUsername = input;
  document.getElementById("nameStatus").style.display = "block";
});

async function saveScore(username, score) {
  const userRef = doc(db, "scores", username);
  const userSnap = await getDoc(userRef);

  if (userSnap.exists()) {
    const existingScore = userSnap.data().score;
    if (score > existingScore) {
      await setDoc(userRef, {
        name: username,
        score: score,
        timestamp: Date.now()
      });
    }
  } else {
    await setDoc(userRef, {
      name: username,
      score: score,
      timestamp: Date.now()
    });
  }

  if (score > hiScore) {
    hiScore = score;
    localStorage.setItem("hiScore", hiScore);
  }
  
  loadLeaderboard();
}

async function loadLeaderboard(){
  const q = query(collection(db, "scores"), orderBy("score", "desc"), limit(10));
  const snapshot = await getDocs(q);
  let html = `<div class="lbTitle">🏆 Global Leaderboard</div>`;
  let rank = 1;
  snapshot.forEach(doc => {
    const d = doc.data();
    const isYou = d.name === savedUsername;
    html += `
    <div class="lbItem ${isYou ? "lbYou" : ""}">
      <div class="lbLeft">
        <div class="lbRank">${rank}</div>
        <div class="lbAvatar">${d.name.charAt(0).toUpperCase()}</div>
        <div>${d.name}</div>
      </div>
      <div class="lbScore">${d.score} pts</div>
    </div>`;
    rank++;
  });
  document.getElementById("leaderboard").innerHTML = html;
}
document.addEventListener("DOMContentLoaded", loadLeaderboard);

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let mode = "normal";
let dinoY = 200;
let velocity = 0;
let gravity = 0.6;
let jumping = false;
let ducking = false;
let speed = 6;
let score = 0;
let gameRunning = false;
let obstacles = [];
let cloudX = 0;
let lastMilestone = 0;
let isNight = false;
let gameStarted = false;

const DINO_WIDTH = 50;
const DINO_HEIGHT = 50;
const DINO_GROUND_Y = 200;
const DUCK_HEIGHT = 30;

// Draw functions for graphics
function drawDino(x, y, width, height, isMode) {
  const isDucking = height < DINO_HEIGHT;
  
  if(isMode === "normal") {
    // Normal Dino - T-Rex style
    ctx.fillStyle = "#2c3e50";
    
    if(isDucking) {
      // Ducking position
      ctx.fillRect(x, y, width, height); // Body
      ctx.fillRect(x + 8, y - 8, 8, 10); // Tail (small)
    } else {
      // Standing position
      ctx.fillRect(x + 5, y + 15, width - 10, height - 20); // Body
      ctx.fillRect(x + 20, y, 10, 15); // Head
      ctx.fillRect(x + 28, y + 2, 3, 5); // Horn
      ctx.fillRect(x + 12, y + 25, 4, 18); // Front leg
      ctx.fillRect(x + 28, y + 25, 4, 18); // Back leg
      ctx.fillRect(x + 38, y + 15, 8, 28); // Tail
    }
    
    // Eyes
    ctx.fillStyle = "#fff";
    ctx.fillRect(x + 22, y + 3, 3, 3);
    ctx.fillStyle = "#000";
    ctx.fillRect(x + 22.5, y + 3.5, 2, 2);
    
  } else {
    // Rishi mode - Funny character
    ctx.fillStyle = "#e74c3c";
    
    if(isDucking) {
      ctx.beginPath();
      ctx.arc(x + width/2, y + height/2, width/2, 0, Math.PI * 2);
      ctx.fill();
    } else {
      // Head
      ctx.beginPath();
      ctx.arc(x + 15, y + 10, 8, 0, Math.PI * 2);
      ctx.fill();
      
      // Body
      ctx.fillRect(x + 8, y + 18, 14, 20);
      
      // Legs
      ctx.fillRect(x + 10, y + 35, 4, 12);
      ctx.fillRect(x + 22, y + 35, 4, 12);
    }
    
    // Eyes (angry)
    ctx.fillStyle = "#000";
    ctx.fillRect(x + 12, y + 7, 2, 2);
    ctx.fillRect(x + 18, y + 7, 2, 2);
    
    // Smile
    ctx.strokeStyle = "#000";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(x + 15, y + 12, 3, 0, Math.PI);
    ctx.stroke();
  }
}

function drawCactus(x, y, width, height, isNight) {
  ctx.fillStyle = isNight ? "#666" : "#27ae60";
  
  // Main stem
  ctx.fillRect(x + 5, y, width - 10, height);
  
  // Spikes
  ctx.fillStyle = isNight ? "#999" : "#1e8449";
  for(let i = 0; i < height; i += 8) {
    // Left spikes
    ctx.fillRect(x - 2, y + i, 3, 4);
    // Right spikes
    ctx.fillRect(x + width - 1, y + i, 3, 4);
  }
}

function drawPterodactyl(x, y, width, height, isNight) {
  ctx.fillStyle = isNight ? "#999" : "#34495e";
  
  // Body
  ctx.beginPath();
  ctx.ellipse(x + width/2, y + height/2, width/2, height/2, -0.3, 0, Math.PI * 2);
  ctx.fill();
  
  // Head
  ctx.beginPath();
  ctx.arc(x + width - 5, y + height/2 - 2, 4, 0, Math.PI * 2);
  ctx.fill();
  
  // Wing
  ctx.beginPath();
  ctx.moveTo(x + width/2 - 5, y + height/2);
  ctx.lineTo(x - 5, y + height/2 - 3);
  ctx.lineTo(x - 5, y + height/2 + 3);
  ctx.closePath();
  ctx.fill();
  
  // Eye
  ctx.fillStyle = "#fff";
  ctx.beginPath();
  ctx.arc(x + width - 2, y + height/2 - 2, 1.5, 0, Math.PI * 2);
  ctx.fill();
}

function startGame(selectedMode) {
  if(!savedUsername) {
    alert("Confirm username first!");
    return;
  }
  
  mode = selectedMode;
  obstacles = [];
  score = 0;
  lastMilestone = 0;
  isNight = false;
  speed = 6;
  dinoY = DINO_GROUND_Y;
  velocity = 0;
  jumping = false;
  ducking = false;
  gameStarted = true;
  
  document.getElementById("menu").style.display = "none";
  document.getElementById("gameContainer").style.display = "block";
  canvas.style.display = "block";
  document.getElementById("score").style.display = "block";
  document.getElementById("hiScore").style.display = "block";
  document.getElementById("hiScore").innerText = "HI " + hiScore;
  document.getElementById("exitBtn").style.display = "inline-block";
  document.getElementById("gameOver").style.display = "none";
  
  gameRunning = true;
  gameLoop();
}

function jump() {
  if(!jumping && gameRunning && !ducking) {
    velocity = -14;
    jumping = true;
    try {
      jumpSound.currentTime = 0;
      jumpSound.play();
    } catch(e) {}
  }
}

function startDuck() {
  if(!jumping && gameRunning) {
    ducking = true;
  }
}

function endDuck() {
  ducking = false;
}

document.addEventListener("keydown", (e) => {
  if(e.code === "Space" || e.code === "ArrowUp") {
    e.preventDefault();
    jump();
  }
  if(e.code === "ArrowDown") {
    e.preventDefault();
    startDuck();
  }
});

document.addEventListener("keyup", (e) => {
  if(e.code === "ArrowDown") {
    endDuck();
  }
});

canvas.addEventListener("click", jump);

// Touch controls
let touchStartX = 0;
let touchStartY = 0;

canvas.addEventListener("touchstart", (e) => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
});

canvas.addEventListener("touchend", (e) => {
  const touchEndX = e.changedTouches[0].clientX;
  const touchEndY = e.changedTouches[0].clientY;
  
  const diffY = touchEndY - touchStartY;
  const diffX = touchEndX - touchStartX;
  
  // Swipe down = duck
  if(diffY > 30 && Math.abs(diffX) < 50) {
    startDuck();
  }
  // Tap = jump
  else if(diffY < 20 && diffX < 50) {
    jump();
  }
});

function spawnObstacle() {
  const obstacleType = Math.random();
  
  if(obstacleType < 0.5) {
    // Small cactus
    obstacles.push({
      x: canvas.width + 40,
      width: 20,
      height: 35,
      type: "cactus-small"
    });
  } else if(obstacleType < 0.8) {
    // Large cactus
    obstacles.push({
      x: canvas.width + 40,
      width: 20,
      height: 50,
      type: "cactus-large"
    });
  } else if(obstacleType < 0.9) {
    // Cactus group
    obstacles.push({x: canvas.width + 40, width: 20, height: 35, type: "cactus-small"});
    obstacles.push({x: canvas.width + 70, width: 20, height: 35, type: "cactus-small"});
  } else {
    // Pterodactyl (flying)
    const flyHeight = 80 + Math.random() * 40;
    obstacles.push({
      x: canvas.width + 40,
      width: 40,
      height: 25,
      type: "pterodactyl",
      y: flyHeight
    });
  }
}

function update() {
  ctx.fillStyle = isNight ? "#1a1a1a" : "#f2f2f2";
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  // Draw clouds
  ctx.fillStyle = isNight ? "rgba(200,200,200,0.3)" : "rgba(200,200,200,0.6)";
  cloudX = (cloudX - 1) % (canvas.width + 50);
  drawCloud(cloudX, 50, 30);
  drawCloud(cloudX + 250, 80, 25);
  drawCloud(cloudX - 200, 120, 35);
  
  // Ground
  ctx.strokeStyle = isNight ? "#444" : "#ccc";
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(0, 250);
  ctx.lineTo(canvas.width, 250);
  ctx.stroke();
  
  // Update dino physics
  velocity += gravity;
  dinoY += velocity;
  
  if(dinoY >= DINO_GROUND_Y) {
    dinoY = DINO_GROUND_Y;
    velocity = 0;
    jumping = false;
  }
  
  // Spawn obstacles
  if(obstacles.length === 0 || obstacles[obstacles.length - 1].x < canvas.width - 200) {
    spawnObstacle();
  }
  
  // Update and draw obstacles
  for(let i = 0; i < obstacles.length; i++) {
    obstacles[i].x -= speed;
    
    const obs = obstacles[i];
    
    if(obs.type === "pterodactyl") {
      drawPterodactyl(obs.x, obs.y, obs.width, obs.height, isNight);
    } else {
      drawCactus(obs.x, 250 - obs.height, obs.width, obs.height, isNight);
    }
    
    // Collision detection
    const dinoLeft = 80;
    const dinoRight = 80 + DINO_WIDTH;
    const dinoTop = dinoY;
    const dinoBottom = dinoY + (ducking ? DUCK_HEIGHT : DINO_HEIGHT);
    
    const obsLeft = obs.x;
    const obsRight = obs.x + obs.width;
    const obsTop = obs.type === "pterodactyl" ? obs.y : (250 - obs.height);
    const obsBottom = obs.type === "pterodactyl" ? (obs.y + obs.height) : 250;
    
    if(dinoRight > obsLeft && dinoLeft < obsRight && dinoBottom > obsTop && dinoTop < obsBottom) {
      endGame();
      return;
    }
  }
  
  // Remove passed obstacles and increase score
  if(obstacles.length > 0 && obstacles[0].x < -50) {
    obstacles.shift();
    score += 10;
    
    // Check for milestone (every 100 points)
    if(Math.floor(score / 100) > lastMilestone) {
      lastMilestone = Math.floor(score / 100);
      playMilestoneEffect();
      // Increase speed
      speed += 0.5;
      if(speed > 15) speed = 15; // Cap speed
    }
    
    // Update night/day cycle
    if(score > 0 && score % 400 === 0) {
      isNight = !isNight;
    }
  }
  
  document.getElementById("score").innerText = "Score: " + score;
  
  // Draw dino with custom graphics
  const dinoDrawHeight = ducking ? DUCK_HEIGHT : DINO_HEIGHT;
  const dinoDrawY = ducking ? (dinoY + 20) : dinoY;
  
  drawDino(80, dinoDrawY, DINO_WIDTH, dinoDrawHeight, mode);
}

function drawCloud(x, y, size) {
  ctx.beginPath();
  ctx.arc(x, y, size, 0, Math.PI * 2);
  ctx.arc(x + size, y, size * 1.2, 0, Math.PI * 2);
  ctx.arc(x + size * 2, y, size, 0, Math.PI * 2);
  ctx.fill();
}

function playMilestoneEffect() {
  const scoreEl = document.getElementById("score");
  scoreEl.classList.remove("milestone");
  void scoreEl.offsetWidth;
  scoreEl.classList.add("milestone");
  
  try {
    milestoneSound.currentTime = 0;
    milestoneSound.play().catch(() => {});
  } catch(e) {}
}

function gameLoop() {
  if(!gameRunning) return;
  update();
  requestAnimationFrame(gameLoop);
}

function endGame() {
  if(!gameRunning) return;
  gameRunning = false;
  document.getElementById("gameOver").style.display = "block";
  
  try {
    deathSound.currentTime = 0;
    deathSound.play().catch(() => {});
  } catch(e) {}
  
  saveScore(savedUsername, score);
}

function restartGame() {
  obstacles = [];
  dinoY = DINO_GROUND_Y;
  velocity = 0;
  score = 0;
  lastMilestone = 0;
  isNight = false;
  speed = 6;
  jumping = false;
  ducking = false;
  
  document.getElementById("score").innerText = "Score: 0";
  document.getElementById("gameOver").style.display = "none";
  gameRunning = true;
  gameLoop();
}

function backToMenu() {
  gameRunning = false;
  document.getElementById("gameContainer").style.display = "none";
  document.getElementById("menu").style.display = "block";
  loadLeaderboard();
}

window.startGame = startGame;
window.restartGame = restartGame;
window.backToMenu = backToMenu;

</script>
</body>
</html>
