<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZebbyAnnan - Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0B1020;
            --bg-card: #1a1f3a;
            --bg-hover: #232d4d;
            --accent-purple: #8B5CF6;
            --accent-blue: #3B82F6;
            --accent-cyan: #06B6D4;
            --text-primary: #FFFFFF;
            --text-secondary: #A0AEC0;
            --border-color: #2d3748;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            overflow: hidden;
        }

        .workspace {
            display: flex;
            width: 100%;
            height: 100vh;
            gap: 0;
        }

        /* SIDEBAR */
        .sidebar {
            width: 80px;
            background: rgba(26, 31, 58, 0.5);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(139, 92, 246, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            gap: 20px;
            position: relative;
            z-index: 1000;
        }

        .sidebar-logo {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--accent-purple) 0%, var(--accent-blue) 100%);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 24px;
            margin-bottom: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 24px rgba(139, 92, 246, 0.3);
        }

        .sidebar-logo:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 32px rgba(139, 92, 246, 0.4);
        }

        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 16px;
            flex: 1;
        }

        .nav-item {
            width: 50px;
            height: 50px;
            background: rgba(139, 92, 246, 0.1);
            border: 2px solid rgba(139, 92, 246, 0.2);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-item:hover {
            background: rgba(139, 92, 246, 0.2);
            border-color: var(--accent-purple);
            transform: translateY(-2px);
        }

        .nav-item.active {
            background: linear-gradient(135deg, var(--accent-purple) 0%, var(--accent-blue) 100%);
            border-color: transparent;
            box-shadow: 0 8px 24px rgba(139, 92, 246, 0.4);
        }

        .nav-item.active::after {
            content: '';
            position: absolute;
            left: -14px;
            width: 4px;
            height: 24px;
            background: linear-gradient(180deg, var(--accent-purple) 0%, var(--accent-blue) 100%);
            border-radius: 2px;
        }

        /* MAIN CONTENT */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 32px;
            overflow: hidden;
        }

        .header {
            margin-bottom: 40px;
            animation: slideDown 0.6s ease;
        }

        .header h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 12px;
            background: linear-gradient(135deg, var(--accent-purple) 0%, var(--accent-cyan) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            font-size: 1.1rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .content-area {
            flex: 1;
            display: flex;
            gap: 24px;
            overflow: hidden;
            position: relative;
        }

        /* PROJECTS GRID */
        .projects-container {
            flex: 1;
            overflow-y: auto;
            padding-right: 12px;
            scroll-behavior: smooth;
        }

        .projects-container::-webkit-scrollbar {
            width: 6px;
        }

        .projects-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .projects-container::-webkit-scrollbar-thumb {
            background: rgba(139, 92, 246, 0.3);
            border-radius: 3px;
        }

        .projects-container::-webkit-scrollbar-thumb:hover {
            background: rgba(139, 92, 246, 0.6);
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
        }

        /* PROJECT CARD */
        .project-card {
            background: rgba(26, 31, 58, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(139, 92, 246, 0.2);
            border-radius: 20px;
            padding: 28px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 16px;
            min-height: 280px;
            animation: fadeInUp 0.6s ease;
        }

        .project-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.1) 0%, rgba(59, 130, 246, 0.1) 100%);
            opacity: 0;
            transition: opacity 0.4s ease;
            border-radius: 20px;
            z-index: -1;
        }

        .project-card:hover::before {
            opacity: 1;
        }

        .project-card:hover {
            border-color: rgba(139, 92, 246, 0.5);
            transform: translateY(-8px);
            box-shadow: 0 20px 60px rgba(139, 92, 246, 0.2);
        }

        .project-emoji {
            font-size: 3rem;
            height: 60px;
            display: flex;
            align-items: center;
        }

        .project-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .project-desc {
            font-size: 0.95rem;
            color: var(--text-secondary);
            line-height: 1.6;
            flex: 1;
        }

        .project-btn {
            align-self: flex-start;
            background: linear-gradient(135deg, var(--accent-purple) 0%, var(--accent-blue) 100%);
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 24px rgba(139, 92, 246, 0.3);
        }

        .project-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(139, 92, 246, 0.4);
        }

        .project-btn:active {
            transform: translateY(0);
        }

        /* RIGHT PANEL */
        .right-panel {
            width: 320px;
            background: rgba(26, 31, 58, 0.5);
            backdrop-filter: blur(10px);
            border-left: 1px solid rgba(139, 92, 246, 0.1);
            border-radius: 20px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            max-height: 100%;
            overflow-y: auto;
            animation: slideInRight 0.6s ease;
            transition: all 0.3s ease;
        }

        .right-panel::-webkit-scrollbar {
            width: 6px;
        }

        .right-panel::-webkit-scrollbar-thumb {
            background: rgba(139, 92, 246, 0.3);
            border-radius: 3px;
        }

        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .panel-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .panel-toggle {
            width: 36px;
            height: 36px;
            background: rgba(139, 92, 246, 0.1);
            border: none;
            border-radius: 12px;
            color: var(--accent-purple);
            font-size: 1.2rem;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .panel-toggle:hover {
            background: rgba(139, 92, 246, 0.2);
        }

        .info-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .info-item {
            background: rgba(139, 92, 246, 0.05);
            padding: 14px;
            border-radius: 12px;
            border-left: 3px solid var(--accent-purple);
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .info-item strong {
            color: var(--accent-purple);
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .stat-box {
            background: rgba(139, 92, 246, 0.1);
            padding: 14px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid rgba(139, 92, 246, 0.2);
        }

        .stat-number {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-purple) 0%, var(--accent-blue) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .social-links {
            display: flex;
            gap: 10px;
        }

        .social-btn {
            flex: 1;
            background: rgba(139, 92, 246, 0.1);
            border: 1px solid rgba(139, 92, 246, 0.2);
            color: var(--text-primary);
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.3s ease;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
        }

        .social-btn:hover {
            background: var(--accent-purple);
            border-color: var(--accent-purple);
        }

        /* ANIMATIONS */
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .project-card:nth-child(1) {
            animation-delay: 0.1s;
        }

        .project-card:nth-child(2) {
            animation-delay: 0.2s;
        }

        /* RESPONSIVE */
        @media (max-width: 1024px) {
            .workspace {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                height: 80px;
                flex-direction: row;
                padding: 0 20px;
            }

            .sidebar-nav {
                flex-direction: row;
                flex: 1;
                justify-content: center;
            }

            .nav-item.active::after {
                left: auto;
                bottom: -14px;
                width: 24px;
                height: 4px;
            }

            .main-content {
                padding: 24px;
            }

            .header h1 {
                font-size: 2.5rem;
            }

            .content-area {
                flex-direction: column;
            }

            .right-panel {
                width: 100%;
                max-height: 300px;
                border-left: none;
                border-top: 1px solid rgba(139, 92, 246, 0.1);
            }

            .panel-toggle {
                display: flex;
            }

            .right-panel.collapsed {
                max-height: 50px;
                overflow: hidden;
            }

            .right-panel.collapsed .info-section,
            .right-panel.collapsed .stats,
            .right-panel.collapsed .social-links {
                display: none;
            }
        }

        @media (max-width: 640px) {
            .main-content {
                padding: 16px;
            }

            .header {
                margin-bottom: 24px;
            }

            .header h1 {
                font-size: 1.8rem;
            }

            .header p {
                font-size: 0.95rem;
            }

            .projects-grid {
                grid-template-columns: 1fr;
            }

            .right-panel {
                max-height: 40px;
                padding: 12px;
            }

            .panel-toggle {
                display: flex;
            }

            .right-panel.collapsed .info-section,
            .right-panel.collapsed .stats,
            .right-panel.collapsed .social-links {
                display: none;
            }
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(11, 16, 32, 0.8);
            backdrop-filter: blur(4px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: fadeIn 0.3s ease;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: rgba(26, 31, 58, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(139, 92, 246, 0.2);
            border-radius: 24px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            position: relative;
            animation: scaleIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 36px;
            height: 36px;
            background: rgba(139, 92, 246, 0.1);
            border: none;
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .modal-close:hover {
            background: rgba(139, 92, 246, 0.2);
        }

        .modal h2 {
            font-size: 2rem;
            margin-bottom: 16px;
            background: linear-gradient(135deg, var(--accent-purple) 0%, var(--accent-cyan) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .modal p {
            color: var(--text-secondary);
            line-height: 1.8;
            margin-bottom: 24px;
            font-size: 1rem;
        }

        .modal-action {
            display: flex;
            gap: 12px;
        }

        .modal-action a {
            flex: 1;
            padding: 14px;
            border-radius: 12px;
            text-decoration: none;
            text-align: center;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .modal-action a.primary {
            background: linear-gradient(135deg, var(--accent-purple) 0%, var(--accent-blue) 100%);
            color: white;
            box-shadow: 0 8px 24px rgba(139, 92, 246, 0.3);
        }

        .modal-action a.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(139, 92, 246, 0.4);
        }

        .modal-action a.secondary {
            background: rgba(139, 92, 246, 0.1);
            color: var(--text-primary);
            border: 1px solid rgba(139, 92, 246, 0.2);
        }

        .modal-action a.secondary:hover {
            background: rgba(139, 92, 246, 0.2);
            border-color: rgba(139, 92, 246, 0.4);
        }
    </style>
</head>
<body>
    <div class="workspace">
        <!-- SIDEBAR -->
        <div class="sidebar">
            <div class="sidebar-logo" onclick="scrollToTop()">Z</div>
            <div class="sidebar-nav">
                <div class="nav-item active" onclick="switchSection('projects')" title="Projects">🎯</div>
                <div class="nav-item" onclick="switchSection('about')" title="About">👤</div>
                <div class="nav-item" onclick="switchSection('contact')" title="Contact">💬</div>
            </div>
        </div>

        <!-- MAIN CONTENT -->
        <div class="main-content">
            <div class="header">
                <h1>ZebbyAnnan</h1>
                <p>Creative Developer & Designer</p>
            </div>

            <div class="content-area">
                <!-- PROJECTS SECTION -->
                <div class="projects-container">
                    <div class="projects-grid" id="projectsGrid">
                        <!-- Projects will be populated here -->
                    </div>
                </div>

                <!-- RIGHT PANEL -->
                <div class="right-panel" id="rightPanel">
                    <div class="panel-header">
                        <div class="panel-title">Quick Info</div>
                        <button class="panel-toggle" onclick="togglePanel()" title="Toggle panel">−</button>
                    </div>

                    <div class="info-section">
                        <div class="info-item">
                            <strong>📍 Based in:</strong> India
                        </div>
                        <div class="info-item">
                            <strong>💻 Specializing in:</strong> Game Development, Web Design, AI Integration
                        </div>
                        <div class="info-item">
                            <strong>🚀 Current Focus:</strong> Building innovative interactive experiences
                        </div>
                    </div>

                    <div class="stats">
                        <div class="stat-box">
                            <div class="stat-number">2</div>
                            <div class="stat-label">Projects</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-number">100%</div>
                            <div class="stat-label">Custom Code</div>
                        </div>
                    </div>

                    <div class="social-links">
                        <a href="https://www.instagram.com/i.wziee" target="_blank" class="social-btn">Instagram</a>
                        <a href="https://github.com/ZebbyAnnan-pixel" target="_blank" class="social-btn">GitHub</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">×</button>
            <h2 id="modalTitle"></h2>
            <p id="modalDesc"></p>
            <div class="modal-action">
                <a href="" id="modalLink" class="primary" target="_self">Open Project</a>
                <button class="secondary" onclick="closeModal()" style="border: 1px solid rgba(139, 92, 246, 0.2); background: rgba(139, 92, 246, 0.1); color: var(--text-primary); padding: 14px; border-radius: 12px; cursor: pointer; font-weight: 600; transition: all 0.3s ease;">Close</button>
            </div>
        </div>
    </div>

    <script>
        const projects = [
            {
                emoji: '🦖',
                title: 'Malludino',
                desc: 'A stylish Chrome Dino game with dual modes - Normal T-Rex and hilarious Rishi mode! Jump, duck, and compete on the global leaderboard with your custom username.',
                link: '/dino/',
                tags: ['Game', 'Canvas', 'Firebase']
            },
            {
                emoji: '🤖',
                title: 'Llama3Pure',
                desc: 'Local AI inference engines for Llama 3 and Gemma models. Run powerful AI directly in your browser with 100% privacy - no servers, no internet required!',
                link: '/llama3pure/',
                tags: ['AI', 'GGUF', 'Privacy']
            }
        ];

        // Render projects
        function renderProjects() {
            const grid = document.getElementById('projectsGrid');
            grid.innerHTML = projects.map((proj, idx) => `
                <div class="project-card" onclick="openModal('${proj.title}', '${proj.desc}', '${proj.link}')">
                    <div class="project-emoji">${proj.emoji}</div>
                    <div class="project-title">${proj.title}</div>
                    <div class="project-desc">${proj.desc}</div>
                    <button class="project-btn">Explore →</button>
                </div>
            `).join('');
        }

        function openModal(title, desc, link) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalDesc').textContent = desc;
            document.getElementById('modalLink').href = link;
            document.getElementById('modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        function togglePanel() {
            const panel = document.getElementById('rightPanel');
            panel.classList.toggle('collapsed');
            document.querySelector('.panel-toggle').textContent = 
                panel.classList.contains('collapsed') ? '+' : '−';
        }

        function switchSection(section) {
            console.log('Section:', section);
            // Add more sections as needed
        }

        function scrollToTop() {
            document.querySelector('.projects-container').scrollTop = 0;
        }

        // Close modal on Escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        // Close modal on background click
        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target.id === 'modal') closeModal();
        });

        // Initialize
        renderProjects();
    </script>
</body>
</html>
