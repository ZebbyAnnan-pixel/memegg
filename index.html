<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BOBA.ai</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Lora:ital@1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-mark">B</div>
        <div class="logo-text">
          <span class="logo-name">BOBA</span><span class="logo-dot">.ai</span>
        </div>
      </div>
      <button class="new-chat-btn" onclick="newChat()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <path d="M12 5v14M5 12h14"/>
        </svg>
        New chat
      </button>
    </div>

    <div class="sidebar-label">Recent</div>
    <div id="history" class="history-list"></div>
  </aside>

  <!-- Mobile overlay -->
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

  <!-- Main -->
  <div class="main">

    <div class="topbar">
      <button class="menu-btn" onclick="toggleSidebar()" aria-label="Toggle sidebar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M3 12h18M3 6h18M3 18h18"/>
        </svg>
      </button>
      <span class="topbar-title" id="topbarTitle">New conversation</span>
    </div>

    <div id="chat" class="chat">
      <div class="empty-state" id="emptyState">
        <div class="empty-logo-mark">B</div>
        <h1 class="empty-title">BOBA<span class="accent">.ai</span></h1>
        <p class="empty-subtitle">Your intelligent conversation companion</p>
        <div class="suggestions">
          <div class="suggestion-chip" onclick="fillPrompt('What can you help me with today?')">What can you help me with?</div>
          <div class="suggestion-chip" onclick="fillPrompt('Write a short poem about morning coffee')">Write a poem for me</div>
          <div class="suggestion-chip" onclick="fillPrompt('Explain quantum computing in simple terms')">Explain something complex</div>
          <div class="suggestion-chip" onclick="fillPrompt('Help me brainstorm ideas for a side project')">Brainstorm with me</div>
        </div>
      </div>
    </div>

    <div class="input-wrapper">
      <form class="inputArea" onsubmit="generate(); return false;">
        <textarea id="prompt" placeholder="Message BOBA.ai…" rows="1"></textarea>
        <button type="submit" class="send-btn" id="sendBtn" aria-label="Send message">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 19V5M5 12l7-7 7 7"/>
          </svg>
        </button>
      </form>
      <p class="input-footer">BOBA.ai can make mistakes. Verify important information.</p>
    </div>

  </div>
</div>

<script src="app.js"></script>
</body>
</html>
